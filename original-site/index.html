<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>新蜂手机商城</title><link rel="stylesheet" href="styles.css"></head><body><header><img src="assets/new-bee-logo-3.png"><div class="search">搜索手机、耳机与配件</div><button id="loginOpen">后台管理</button></header><nav>全部商品分类　首页　手机专区　智能穿戴　影音娱乐　周边配件</nav><main id="public"><section class="mallHero"><aside>手机通讯<br>智能穿戴<br>影音娱乐<br>电脑办公<br>周边配件</aside><img src="assets/swiper/banner01.jpg"></section><h2>新品上市 <small>NEW ARRIVALS</small></h2><div id="cards" class="cards"></div></main><dialog id="login"><form id="loginForm"><button type="button" id="close">×</button><img src="assets/login-logo-2.png"><h2>商城后台管理系统</h2><select name="role"><option value="admin">管理员</option></select><input name="username" value="admin"><input name="password" type="password" value="123456"><button>登录</button><p id="msg"></p></form></dialog><div id="app" hidden><aside class="side"><h2>newbee mall</h2><a>控制台</a><a class="active">商品管理</a><a>分类管理</a><a>订单管理</a><a>会员管理</a><a>轮播图管理</a><button id="logout">退出</button></aside><article><div class="adminTop">新蜂商城管理系统</div><div class="toolbar"><h1>商品管理</h1><button id="add">＋ 添加商品</button></div><div class="stats"><b id="count">0</b><span>商品总数</span></div><table><thead><tr><th>商品名称</th><th>副标题</th><th>状态</th><th>售价</th><th>操作</th></tr></thead><tbody id="rows"></tbody></table></article></div><dialog id="editor"><form id="editForm"><button type="button" id="editClose">×</button><h2>商品信息</h2><input type="hidden" name="id"><input type="hidden" name="module_key" value="product"><input name="title" placeholder="商品名称" required><input name="subtitle" placeholder="副标题"><input name="status" value="上架"><input name="amount" type="number" value="0"><textarea name="description" placeholder="商品说明"></textarea><button>保存商品</button></form></dialog><script src="app.js"></script></body></html>
